services:
  blaze:
    image: "blaze:latest"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx2g"
      LOG_LEVEL: "debug"
      ALLOW_MULTIPLE_DELETE: "true"
      ENABLE_INTERACTION_DELETE_HISTORY: "${ENABLE_INTERACTION_DELETE_HISTORY:-false}"
      ENABLE_OPERATION_PATIENT_PURGE: "${ENABLE_OPERATION_PATIENT_PURGE:-false}"
      ENABLE_OPERATION_GRAPH: "${ENABLE_OPERATION_GRAPH:-false}"
      ENABLE_OPERATION_CQL: "${ENABLE_OPERATION_CQL:-false}"
      JVM_METRICS_LOGGER_INTERVAL: "PT1M"
    ports:
    - "8081:8081"
    volumes:
    - "blaze-data:/app/data"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ingress:
    image: "nginx:1.29.4@sha256:9dd288848f4495869f76676e419ae2d767ca99fece2ec37ec0261f9fdaab5204"
    ports:
    - "8080:8080"
    volumes:
    - "./nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    depends_on:
      blaze:
        condition: service_healthy

volumes:
  blaze-data:
