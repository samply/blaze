server {
    listen       8080;
    server_name  _;

    # Needed for large FHIR uploads
    client_max_body_size 100M;

    # General reverse proxy config
    proxy_http_version 1.1;

    # Stock reverse proxy buffer of one memory page. nginx requires the whole
    # upstream response header block (status line, all headers and the trailing
    # blank line) to fit into a single buffer of this size. The paging links
    # feature has to keep the `Link` header small enough to not overflow it.
    proxy_buffer_size 4k;

    location / {
        proxy_pass http://blaze:8080;
        proxy_set_header Connection "";
    }
}
